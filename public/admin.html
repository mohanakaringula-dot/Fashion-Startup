<!doctype html><html><head><meta charset='utf-8'><title>Admin Panel</title><link rel='stylesheet' href='/css/styles.css'></head>
<body><div class='container'><h1>Admin Panel</h1><p>Review applications, manage designers, consultations, orders, analytics.</p><button id='analytics' class='lux-btn'>Load Analytics</button><pre id='out'></pre></div>
<script src='/js/app.js'></script><script>
document.getElementById('analytics').onclick=async()=>{const data=await fetch('/api/admin/analytics',{headers:CDA.state.token?{Authorization:`Bearer ${CDA.state.token}`}:{}}).then(r=>r.json());document.getElementById('out').textContent=JSON.stringify(data,null,2);};
</script></body></html>
