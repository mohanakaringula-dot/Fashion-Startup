<!doctype html><html><head><meta charset='utf-8'><title>Client Dashboard</title><link rel='stylesheet' href='/css/styles.css'></head>
<body><div class='container'><h1>Client Dashboard</h1><p>Active projects and order progress.</p><div id='orders' class='grid'></div></div>
<script src='/js/app.js'></script><script>
(async()=>{const res=await fetch('/api/orders/my',{headers:CDA.state.token?{Authorization:`Bearer ${CDA.state.token}`}:{}}).then(r=>r.json());const el=document.getElementById('orders');(res.orders||[]).forEach(o=>{const c=document.createElement('div');c.className='card';c.innerHTML=`<strong>${o.progress_stage||'Brief confirmed'}</strong><p>${o.notes||''}</p><small>${o.created_at||''}</small>`;el.appendChild(c);});if(res.error)el.textContent=res.error;})();
</script></body></html>
