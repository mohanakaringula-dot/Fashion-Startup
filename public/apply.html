<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Apply</title><link rel='stylesheet' href='/css/styles.css'></head>
<body><div class='container'><h1>Application</h1><form id='applyForm' enctype='multipart/form-data'>
<input name='name' placeholder='Full name' required><input name='email' type='email' placeholder='Email' required><input name='phone' placeholder='Phone' required>
<input name='profession' placeholder='Profession'><input name='city' placeholder='City'><input name='event_type' placeholder='Event type'><input name='budget_range' placeholder='Budget range'><input name='referral_source' placeholder='Referral source'>
<input name='verification_doc' type='file' accept='.jpg,.jpeg,.png,.pdf'>
<button class='lux-btn'>Submit Application</button></form><p id='msg'></p></div>
<script src='/js/app.js'></script><script>
document.getElementById('applyForm').onsubmit = async (e)=>{e.preventDefault();const r=await CDA.submitApplication(e.target);document.getElementById('msg').textContent=r.error||'Application submitted.';};
</script></body></html>
